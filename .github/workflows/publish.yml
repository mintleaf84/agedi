name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  push:
    tags:
      - 'v*' # Triggers on tag pushes
  workflow_dispatch: # Triggers on manual button clicks

jobs:
  # ---------------------------------------------------------
  # JOB 1: Build the package (Runs every time)
  # ---------------------------------------------------------
  build:
    name: Build package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Install build dependencies
        run: python -m pip install --upgrade pip build
        
      - name: Build the package
        run: python -m build
        
      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # ---------------------------------------------------------
  # JOB 2: Publish to TestPyPI (ONLY runs on Tag Push)
  # ---------------------------------------------------------
  publish-to-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'push' # The magic condition
    runs-on: ubuntu-latest
    
    environment:
      name: testpypi
      url: https://test.pypi.org/p/YOUR_PACKAGE_NAME # Replace with your package name
      
    permissions:
      id-token: write
      
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------
  # JOB 3: Publish to real PyPI (ONLY runs Manually)
  # ---------------------------------------------------------
  publish-to-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'workflow_dispatch' # The magic condition
    runs-on: ubuntu-latest
    
    environment:
      name: pypi
      url: https://pypi.org/p/YOUR_PACKAGE_NAME # Replace with your package name
      
    permissions:
      id-token: write
      
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
